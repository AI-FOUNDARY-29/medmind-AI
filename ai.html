<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chat - MedMind AI</title>
  <style>
    * {
      margin: 0 !important;
      padding: 0 !important;
      box-sizing: border-box !important;
    }

    html, body {
      width: 100% !important;
      height: 100% !important;
      background: #0a0e27 !important;
      color: #ffffff !important;
      font-family: Arial, sans-serif !important;
      overflow-x: hidden !important;
    }

    main {
      background: #0a0e27 !important;
      min-height: 100vh !important;
      padding: 2rem !important;
    }

    .container {
      max-width: 900px !important;
      margin: 0 auto !important;
    }

    h1 {
      color: #00ffff !important;
      font-size: 3rem !important;
      font-weight: 900 !important;
      margin-bottom: 0.5rem !important;
      text-shadow: 0 0 30px #00ffff, 0 0 60px #0099ff !important;
      letter-spacing: 2px !important;
    }

    p {
      color: #00ff88 !important;
      font-size: 1.2rem !important;
      margin-bottom: 1.5rem !important;
    }

    .input-wrapper {
      background: #1a1f3a !important;
      border: 3px solid #ff00ff !important;
      border-radius: 10px !important;
      padding: 1.2rem !important;
      margin-bottom: 2rem !important;
      display: flex !important;
      gap: 10px !important;
      box-shadow: 0 0 30px #ff00ff !important;
    }

    input[type="password"],
    input[type="text"] {
      flex: 1 !important;
      background: #0a0e27 !important;
      border: 2px solid #00ffff !important;
      color: #00ffff !important;
      padding: 1rem !important;
      border-radius: 8px !important;
      font-size: 1.1rem !important;
      font-weight: bold !important;
      box-shadow: 0 0 15px #00ffff !important;
    }

    input::placeholder {
      color: #00ff88 !important;
      opacity: 0.8 !important;
    }

    input:focus {
      outline: none !important;
      border-color: #ff00ff !important;
      box-shadow: 0 0 25px #ff00ff !important;
      background: #0f1428 !important;
    }

    button {
      background: linear-gradient(45deg, #ff00ff, #00ffff) !important;
      color: #000000 !important;
      border: none !important;
      padding: 1rem 2rem !important;
      border-radius: 8px !important;
      cursor: pointer !important;
      font-weight: 900 !important;
      font-size: 1.1rem !important;
      box-shadow: 0 0 30px #ff00ff, 0 0 60px #00ffff !important;
      transition: all 0.3s !important;
      text-transform: uppercase !important;
      letter-spacing: 1px !important;
    }

    button:hover:not(:disabled) {
      transform: scale(1.1) !important;
      box-shadow: 0 0 50px #ff00ff, 0 0 100px #00ffff !important;
    }

    button:active:not(:disabled) {
      transform: scale(0.95) !important;
    }

    button:disabled {
      opacity: 0.3 !important;
      cursor: not-allowed !important;
    }

    .chat-box {
      background: #1a1f3a !important;
      border: 3px solid #ff00ff !important;
      border-radius: 12px !important;
      padding: 1.5rem !important;
      height: 550px !important;
      display: flex !important;
      flex-direction: column !important;
      box-shadow: 0 0 40px #ff00ff !important;
    }

    #messages {
      flex: 1 !important;
      overflow-y: auto !important;
      margin-bottom: 1.5rem !important;
      display: flex !important;
      flex-direction: column !important;
      gap: 1rem !important;
      padding-right: 0.5rem !important;
    }

    .msg-user {
      background: linear-gradient(45deg, #ff0088, #ff3366) !important;
      color: #ffffff !important;
      padding: 1rem 1.5rem !important;
      border-radius: 10px !important;
      align-self: flex-end !important;
      max-width: 75% !important;
      border: 2px solid #ff00ff !important;
      box-shadow: 0 0 20px #ff0088 !important;
      word-wrap: break-word !important;
      font-weight: bold !important;
      font-size: 1rem !important;
    }

    .msg-assistant {
      background: linear-gradient(45deg, #00ffff, #00ff88) !important;
      color: #000000 !important;
      padding: 1rem 1.5rem !important;
      border-radius: 10px !important;
      align-self: flex-start !important;
      max-width: 75% !important;
      border: 2px solid #00ffff !important;
      box-shadow: 0 0 20px #00ffff !important;
      word-wrap: break-word !important;
      font-weight: bold !important;
      font-size: 1rem !important;
    }

    .msg-error {
      background: linear-gradient(45deg, #ff3333, #ff6666) !important;
      color: #ffffff !important;
      padding: 1rem 1.5rem !important;
      border-radius: 10px !important;
      align-self: center !important;
      max-width: 75% !important;
      border: 2px solid #ff0000 !important;
      box-shadow: 0 0 20px #ff0000 !important;
      word-wrap: break-word !important;
      font-weight: bold !important;
      font-size: 1rem !important;
    }

    .msg-loading {
      background: linear-gradient(45deg, #ffaa00, #ffff00) !important;
      color: #000000 !important;
      padding: 1rem 1.5rem !important;
      border-radius: 10px !important;
      align-self: flex-start !important;
      border: 2px solid #ffaa00 !important;
      box-shadow: 0 0 20px #ffaa00 !important;
      font-weight: bold !important;
      font-size: 1rem !important;
      animation: pulse 1s infinite !important;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1 !important; }
      50% { opacity: 0.5 !important; }
    }

    .input-box {
      display: flex !important;
      gap: 10px !important;
    }

    .input-box input {
      flex: 1 !important;
      background: #0a0e27 !important;
      border: 2px solid #00ff88 !important;
      color: #00ff88 !important;
      padding: 1rem !important;
      border-radius: 8px !important;
      font-size: 1rem !important;
      font-weight: bold !important;
      box-shadow: 0 0 15px #00ff88 !important;
    }

    .input-box input:focus {
      outline: none !important;
      border-color: #ff00ff !important;
      box-shadow: 0 0 25px #ff00ff !important;
    }

    .input-box button {
      background: linear-gradient(45deg, #00ff88, #00ffff) !important;
      padding: 1rem 2rem !important;
      font-size: 1rem !important;
      white-space: nowrap !important;
    }

    /* Scrollbar */
    #messages::-webkit-scrollbar {
      width: 12px !important;
    }

    #messages::-webkit-scrollbar-track {
      background: #0a0e27 !important;
    }

    #messages::-webkit-scrollbar-thumb {
      background: linear-gradient(45deg, #ff00ff, #00ffff) !important;
      border-radius: 6px !important;
      border: 2px solid #1a1f3a !important;
    }

    #messages::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(45deg, #ff0088, #00ff88) !important;
    }

    @media (max-width: 640px) {
      main {
        padding: 1rem !important;
      }

      h1 {
        font-size: 2rem !important;
      }

      p {
        font-size: 1rem !important;
      }

      .chat-box {
        height: 400px !important;
        padding: 1rem !important;
      }

      .input-wrapper {
        flex-direction: column !important;
        gap: 0.5rem !important;
      }

      .msg-user,
      .msg-assistant,
      .msg-error,
      .msg-loading {
        max-width: 95% !important;
      }

      button {
        width: 100% !important;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="container">
      <h1>💬 AI CHAT</h1>
      <p>🤖 Talk to MedMind AI</p>

      <!-- API Key Section -->
      <div class="input-wrapper" id="apiSection">
        <input 
          type="password" 
          id="apiKeyInput" 
          placeholder="Paste Sarvam API Key Here"
        >
        <button onclick="setApiKey()">SET KEY</button>
      </div>

      <!-- Chat Section -->
      <div class="chat-box">
        <div id="messages">
          <div class="msg-assistant">
            👋 Hi! Paste your Sarvam API key above to start chatting!
          </div>
        </div>

        <div class="input-box">
          <input 
            type="text" 
            id="userInput" 
            placeholder="Type your message..."
            disabled
            onkeypress="if(event.key==='Enter') sendMsg()"
          >
          <button id="sendBtn" onclick="sendMsg()" disabled>SEND</button>
        </div>
      </div>
    </div>
  </main>

  <!-- Scripts -->
  <script src="sarvam-ai.js"></script>
  <script src="script.js"></script>
  <script src="app.js"></script>

  <script>
    let keySet = false;

    function setApiKey() {
      const key = document.getElementById('apiKeyInput').value.trim();
      
      if (!key) {
        showMsg('❌ Enter API key!', 'error');
        return;
      }

      if (window.sarvamAI) {
        window.sarvamAI.setApiKey(key);
        keySet = true;

        document.getElementById('apiSection').style.display = 'none';
        document.getElementById('userInput').disabled = false;
        document.getElementById('sendBtn').disabled = false;

        document.getElementById('messages').innerHTML = '';
        showMsg('✅ API Key Set! Ready to chat!', 'assistant');
        
        console.log('✅ KEY SET');
      } else {
        showMsg('❌ Sarvam AI not loaded!', 'error');
      }
    }

    async function sendMsg() {
      if (!keySet) {
        showMsg('⚠️ Set API key first!', 'error');
        return;
      }

      const input = document.getElementById('userInput');
      const msg = input.value.trim();

      if (!msg) return;

      document.getElementById('userInput').disabled = true;
      document.getElementById('sendBtn').disabled = true;

      showMsg(msg, 'user');
      input.value = '';

      const loadId = showMsg('⏳ Thinking...', 'loading');

      try {
        console.log('Sending:', msg);
        const response = await window.sarvamAI.getAIResponse(msg);
        console.log('Response:', response);

        document.getElementById(loadId)?.remove();
        showMsg(response, 'assistant');
      } catch (error) {
        console.error('Error:', error);
        document.getElementById(loadId)?.remove();
        showMsg('❌ Error: ' + error.message, 'error');
      } finally {
        document.getElementById('userInput').disabled = false;
        document.getElementById('sendBtn').disabled = false;
        input.focus();
      }
    }

    function showMsg(text, type) {
      const container = document.getElementById('messages');
      const div = document.createElement('div');
      const id = 'msg' + Date.now();

      div.id = id;
      div.textContent = text;

      if (type === 'user') {
        div.className = 'msg-user';
      } else if (type === 'assistant') {
        div.className = 'msg-assistant';
      } else if (type === 'loading') {
        div.className = 'msg-loading';
      } else {
        div.className = 'msg-error';
      }

      container.appendChild(div);
      container.scrollTop = container.scrollHeight;

      return id;
    }

    console.log('✅ AI Page Ready');
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - MedMind AI</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="additions.css">
  
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
      min-height: 100vh !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
    }

    main {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
      min-height: 100vh !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      padding: 1rem !important;
    }

    .login-container {
      background: rgba(255, 255, 255, 0.95) !important;
      border-radius: 20px !important;
      padding: 3rem !important;
      width: 100% !important;
      max-width: 450px !important;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3) !important;
      text-align: center !important;
    }

    .login-logo h1 {
      color: #667eea !important;
      font-size: 2.5rem !important;
      margin: 0 0 0.5rem 0 !important;
    }

    .login-logo p {
      color: #999 !important;
      margin: 0 0 2rem 0 !important;
      font-size: 0.95rem !important;
    }

    .demo-note {
      color: #666;
      font-size: 1rem;
      margin-bottom: 1.5rem;
    }

    .demo-btn {
      width: 100% !important;
      padding: 1rem !important;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
      color: white !important;
      border: none !important;
      border-radius: 8px !important;
      font-weight: 700 !important;
      font-size: 1.1rem !important;
      cursor: pointer !important;
      transition: all 0.3s !important;
    }

    .demo-btn:hover {
      transform: translateY(-2px) !important;
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3) !important;
    }

    .demo-btn:active {
      transform: translateY(0) !important;
    }

    @media (max-width: 640px) {
      .login-container {
        padding: 2rem !important;
      }
      .login-logo h1 {
        font-size: 2rem !important;
      }
    }
  </style>
</head>
<body data-page="login">
  <main>
    <div class="login-container">
      <div class="login-logo">
        <h1>💊 MedMind</h1>
        <p>Your Personal Health Assistant</p>
      </div>

      <p class="demo-note">Welcome! This is a demo of MedMind AI.</p>

      <button class="demo-btn" type="button" onclick="demoLogin()">
        🚀 Enter Demo
      </button>
    </div>
  </main>

  <script src="script.js"></script>
  <script src="app.js"></script>

  <script>
    function demoLogin() {
      localStorage.setItem('medmind_user', JSON.stringify({
        email: 'demo@medmind.ai',
        loggedIn: true,
        loginTime: new Date().toISOString()
      }));
      window.location.href = 'home.html';
    }
  </script>
</body>
</html>

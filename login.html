<!DOCTYPE html>  <html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Login - MedMind AI</title>  
    <link rel="stylesheet" href="style.css">  
</head>  
<body class="auth-body">  
    <div class="auth-container">  
        <div class="auth-background">  
            <div class="gradient-blob blob-1"></div>  
            <div class="gradient-blob blob-2"></div>  
        </div>  <div class="auth-card">  
        <div class="auth-header">  
            <div class="auth-logo">  
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="48" height="48">  
                    <path d="M50 10 Q70 20 70 40 Q70 60 50 70 Q30 60 30 40 Q30 20 50 10" fill="url(#logoGradient2)" stroke="white" stroke-width="2"/>  
                    <circle cx="50" cy="40" r="8" fill="white"/>  
                    <defs>  
                        <linearGradient id="logoGradient2" x1="0%" y1="0%" x2="100%" y2="100%">  
                            <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />  
                            <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />  
                        </linearGradient>  
                    </defs>  
                </svg>  
            </div>  
            <h1>Welcome Back</h1>  
            <p>Sign in to your MedMind account</p>  
        </div>  

        <form class="auth-form" id="loginForm">  
            <div class="form-group">  
                <label for="email">Email Address</label>  
                <div class="input-wrapper">  
                    <svg class="input-icon" viewBox="0 0 24 24" width="20" height="20">  
                        <path fill="currentColor" d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>  
                    </svg>  
                    <input   
                        type="email"   
                        id="email"   
                        name="email"   
                        placeholder="you@example.com"   
                        required  
                    >  
                </div>  
            </div>  

            <div class="form-group">  
                <label for="password">Password</label>  
                <div class="input-wrapper">  
                    <svg class="input-icon" viewBox="0 0 24 24" width="20" height="20">  
                        <path fill="currentColor" d="M18 8h-1V6c0-2.76-2.24-5-5-5s-5 2.24-5 5v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/>  
                    </svg>  
                    <input   
                        type="password"   
                        id="password"   
                        name="password"   
                        placeholder="••••••••"   
                        required  
                    >  
                    <button type="button" class="toggle-password" onclick="togglePassword('password')">  
                        <svg viewBox="0 0 24 24" width="18" height="18">  
                            <path fill="currentColor" d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>  
                        </svg>  
                    </button>  
                </div>  
            </div>  

            <div class="form-options">  
                <label class="remember-me">  
                    <input type="checkbox" name="remember">  
                    <span>Remember me</span>  
                </label>  
                <a href="#" class="forgot-link">Forgot password?</a>  
            </div>  

            <button type="submit" class="btn btn-primary btn-large">  
                <span>Sign In</span>  
                <svg class="btn-icon" viewBox="0 0 24 24" width="18" height="18">  
                    <path fill="currentColor" d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>  
                </svg>  
            </button>  
        </form>  

        <div class="divider">  
            <span>Don't have an account?</span>  
        </div>  

        <a href="signup.html" class="btn btn-secondary btn-large">  
            <span>Create Account</span>  
        </a>  

        <div class="demo-note">  
            <p>Demo Credentials:</p>  
            <p>Email: <code>demo@medmind.ai</code></p>  
            <p>Password: <code>Demo@123</code></p>  
        </div>  
    </div>  
</div>  

<script src="script.js"></script>  
<script>  
    function togglePassword(fieldId) {  
        const field = document.getElementById(fieldId);  
        field.type = field.type === 'password' ? 'text' : 'password';  
    }  

    document.getElementById('loginForm').addEventListener('submit', function(e) {  
        e.preventDefault();  
          
        const email = document.getElementById('email').value;  
        const password = document.getElementById('password').value;  

        // Demo login - in production, this would be an API call  
        if (email === 'demo@medmind.ai' && password === 'Demo@123') {  
            localStorage.setItem('medmind_user', JSON.stringify({  
                id: '1',  
                name: 'Alex Johnson',  
                email: email,  
                avatar: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400&h=400&fit=crop',  
                bloodGroup: 'O+',  
                height: '175 cm',  
                weight: '72 kg',  
                dob: '1995-06-15',  
                insurance: 'BlueCross BlueShield'  
            }));  
              
            window.location.href = 'home.html';  
        } else {  
            showNotification('Invalid credentials. Please try again.', 'error');  
        }  
    });  
</script>

</body>  
</html>

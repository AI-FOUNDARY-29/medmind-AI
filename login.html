<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - MedMind AI</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="additions.css">
  
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
      min-height: 100vh !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
    }

    main {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
      min-height: 100vh !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      padding: 1rem !important;
    }

    .login-container {
      background: rgba(255, 255, 255, 0.95) !important;
      border-radius: 20px !important;
      padding: 3rem !important;
      width: 100% !important;
      max-width: 450px !important;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3) !important;
    }

    .login-logo {
      text-align: center !important;
      margin-bottom: 2rem !important;
    }

    .login-logo h1 {
      color: #667eea !important;
      font-size: 2.5rem !important;
      margin: 0 !important;
    }

    .login-logo p {
      color: #999 !important;
      margin: 0.5rem 0 0 0 !important;
      font-size: 0.95rem !important;
    }

    .form-group {
      margin-bottom: 1.5rem !important;
    }

    label {
      display: block !important;
      color: #333 !important;
      font-weight: 600 !important;
      margin-bottom: 0.5rem !important;
      font-size: 0.95rem !important;
    }

    input[type="email"],
    input[type="password"] {
      width: 100% !important;
      padding: 1rem !important;
      border: 1px solid #ddd !important;
      border-radius: 8px !important;
      font-size: 1rem !important;
      transition: all 0.3s !important;
      background: #f9f9f9 !important;
      color: #333 !important;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      outline: none !important;
      border-color: #667eea !important;
      background: #fff !important;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1) !important;
    }

    input::placeholder {
      color: #aaa !important;
    }

    .remember-forgot {
      display: flex !important;
      justify-content: space-between !important;
      align-items: center !important;
      font-size: 0.9rem !important;
      margin-bottom: 1.5rem !important;
      color: #666 !important;
    }

    .remember-forgot a {
      color: #667eea !important;
      text-decoration: none !important;
      font-weight: 600 !important;
    }

    .remember-forgot a:hover {
      text-decoration: underline !important;
    }

    button {
      width: 100% !important;
      padding: 1rem !important;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
      color: white !important;
      border: none !important;
      border-radius: 8px !important;
      font-weight: 700 !important;
      font-size: 1rem !important;
      cursor: pointer !important;
      transition: all 0.3s !important;
      margin-bottom: 1.5rem !important;
    }

    button:hover {
      transform: translateY(-2px) !important;
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3) !important;
    }

    button:active {
      transform: translateY(0) !important;
    }

    .signup-link {
      text-align: center !important;
      color: #666 !important;
      font-size: 0.9rem !important;
    }

    .signup-link a {
      color: #667eea !important;
      text-decoration: none !important;
      font-weight: 600 !important;
    }

    .signup-link a:hover {
      text-decoration: underline !important;
    }

    @media (max-width: 640px) {
      .login-container {
        padding: 2rem !important;
      }

      .login-logo h1 {
        font-size: 2rem !important;
      }
    }
  </style>
</head>
<body data-page="login">
  <main>
    <div class="login-container">
      <div class="login-logo">
        <h1>💊 MedMind</h1>
        <p>Your Personal Health Assistant</p>
      </div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            placeholder="you@example.com"
            required
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            placeholder="Enter your password"
            required
          >
        </div>

        <div class="remember-forgot">
          <label style="margin: 0 !important;">
            <input type="checkbox"> Remember me
          </label>
          <a href="#">Forgot password?</a>
        </div>

        <button type="submit">Sign In</button>
      </form>

      <div class="signup-link">
        Don't have an account? <a href="#">Create Account</a>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
  <script src="sarvam-ai.js"></script>
  <script src="app.js"></script>

  <script>
    function handleLogin(event) {
      event.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!email || !password) {
        alert('Please enter email and password');
        return;
      }

      // Save login info (any email/password works for demo)
      localStorage.setItem('medmind_user', JSON.stringify({
        email: email,
        loggedIn: true,
        loginTime: new Date().toISOString()
      }));

      console.log('✅ Logged in as:', email);

      // Redirect to home
      setTimeout(() => {
        window.location.href = 'home.html';
      }, 500);
    }
  </script>
</body>
</html>
